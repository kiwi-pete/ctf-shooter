<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fighting Island Arena - Increment 1</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-color: #0b0f19;
            color: #e2e8f0;
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        #game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 95vw;
            max-width: 1200px;
        }

        #game-header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding: 8px 24px;
            background: rgba(30, 41, 59, 0.65);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            box-sizing: border-box;
        }

        #game-header h1 {
            font-size: 20px;
            margin: 0;
            font-weight: 800;
            letter-spacing: 0.5px;
            background: linear-gradient(135deg, #a3e635, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 2px 10px rgba(163, 230, 53, 0.15);
        }

        .team-status-container {
            display: flex;
            gap: 24px;
        }

        .team-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 600;
        }

        .team-status.red-team {
            color: #f87171;
        }

        .team-status.blue-team {
            color: #60a5fa;
        }

        .team-label {
            letter-spacing: 0.5px;
        }

        .hud-icon {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 24px;
            height: 24px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            font-size: 12px;
            transition: transform 0.2s, background-color 0.2s;
        }

        .hud-icon.tagged {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.4);
            animation: flash 1s infinite;
        }

        .hud-icon.player {
            border: 1.5px solid #fbbf24;
            background: rgba(251, 191, 36, 0.1);
        }

        @keyframes flash {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        #gameCanvas {
            width: 100%;
            height: auto;
            aspect-ratio: 1200 / 800;
            background-color: #a3e635; /* Lime-400 fallback */
            border: 4px solid #1e293b;
            border-radius: 16px;
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.6), 0 0 20px rgba(59, 130, 246, 0.15);
            cursor: crosshair;
        }

        #game-controls {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
            padding: 8px 24px;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            font-size: 13px;
            color: #94a3b8;
            box-sizing: border-box;
        }

        .control-key {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .control-key span {
            background: #334155;
            color: #f1f5f9;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 600;
            box-shadow: 0 2px 0 #1e293b;
        }

        #restart-btn {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white;
            border: none;
            border-radius: 6px;
            padding: 6px 16px;
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2), 0 2px 4px -1px rgba(37, 99, 235, 0.1);
            transition: all 0.2s;
        }

        #restart-btn:hover {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            transform: translateY(-1px);
            box-shadow: 0 6px 8px -1px rgba(37, 99, 235, 0.3);
        }

        #restart-btn:active {
            transform: translateY(0);
            box-shadow: 0 2px 4px -1px rgba(37, 99, 235, 0.2);
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="game-header">
            <h1>Fighting Island Arena</h1>
            <div class="team-status-container">
                <div class="team-status red-team">
                    <span class="team-label">RED BOTS:</span>
                    <span id="red-bots-hud">🤖 🤖 🤖</span>
                </div>
                <div class="team-status blue-team">
                    <span class="team-label">BLUE BOTS:</span>
                    <span id="blue-bots-hud">👑 🤖 🤖 🤖</span>
                </div>
            </div>
        </div>
        
        <canvas id="gameCanvas" width="1200" height="800"></canvas>
        
        <div id="game-controls">
            <div class="control-key"><span>WASD</span> / <span>Arrows</span> to Move</div>
            <div class="control-key"><span>Mouse Move</span> to Aim</div>
            <div class="control-key"><span>Left Click</span> to Shoot</div>
            <button id="restart-btn">Restart Match</button>
        </div>
    </div>

    <script>
        // Polyfill roundRect for canvas rendering in older browser builds
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
                if (typeof r === 'number') {
                    r = { tl: r, tr: r, br: r, bl: r };
                } else if (Array.isArray(r)) {
                    r = { tl: r[0], tr: r[1] || r[0], br: r[2] || r[0], bl: r[3] || r[1] || r[0] };
                } else {
                    r = Object.assign({ tl: 0, tr: 0, br: 0, bl: 0 }, r);
                }
                this.beginPath();
                this.moveTo(x + r.tl, y);
                this.lineTo(x + w - r.tr, y);
                this.arcTo(x + w, y, x + w, y + r.tr, r.tr);
                this.lineTo(x + w, y + h - r.br);
                this.arcTo(x + w, y + h, x + w - r.br, y + h, r.br);
                this.lineTo(x + r.bl, y + h);
                this.arcTo(x, y + h, x, y + h - r.bl, r.bl);
                this.lineTo(x, y + r.tl);
                this.arcTo(x, y, x + r.tl, y, r.tl);
                this.closePath();
                return this;
            };
        }

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game State
        const STATE = {
            players: [],
            bullets: [],
            obstacles: [],
            particles: [],
            baseRadius: 90,
            bases: {
                red: { x: 120, y: 400 },
                blue: { x: 1080, y: 400 }
            }
        };

        // Inputs
        const keys = { w: false, a: false, s: false, d: false };
        const mouse = { x: 0, y: 0, click: false };

        // Player / Entity Class
        class Player {
            constructor(x, y, team, isBot = false, id) {
                this.id = id;
                this.x = x;
                this.y = y;
                this.vx = 0;
                this.vy = 0;
                this.radius = 20;
                this.speed = 180; // px/sec
                this.team = team;
                this.isBot = isBot;
                this.angle = team === 'red' ? 0 : Math.PI; // point at enemy base initially
                this.shootCooldown = 0.5; // initial start buffer
                this.tagTimer = 0; // if > 0, tagged
                this.spawnX = x;
                this.spawnY = y;
                this.color = team === 'red' ? '#ef4444' : '#3b82f6';
                this.borderColor = team === 'red' ? '#fca5a5' : '#93c5fd';
            }

            tag() {
                this.tagTimer = 1.0; // 1 second tagged downtime
                this.vx = 0;
                this.vy = 0;
                createExplosion(this.x, this.y, this.color);
            }
        }

        // Initialize Game
        function initGame() {
            STATE.players = [];
            STATE.bullets = [];
            STATE.particles = [];
            
            // Human player (Blue Team)
            STATE.players.push(new Player(1080, 400, 'blue', false, 'YOU'));
            
            // 3 Blue Bots
            STATE.players.push(new Player(1080, 250, 'blue', true, 'Blue Bot 1'));
            STATE.players.push(new Player(1080, 550, 'blue', true, 'Blue Bot 2'));
            STATE.players.push(new Player(1130, 400, 'blue', true, 'Blue Bot 3'));
            
            // 3 Red Bots
            STATE.players.push(new Player(120, 250, 'red', true, 'Red Bot 1'));
            STATE.players.push(new Player(120, 550, 'red', true, 'Red Bot 2'));
            STATE.players.push(new Player(70, 400, 'red', true, 'Red Bot 3'));

            // Set up obstacles (beveled cover blocks)
            STATE.obstacles = [
                // Center blocks
                { x: 560, y: 280, width: 80, height: 240 },
                // Left protective shields
                { x: 340, y: 150, width: 60, height: 140 },
                { x: 340, y: 510, width: 60, height: 140 },
                // Right protective shields
                { x: 800, y: 150, width: 60, height: 140 },
                { x: 800, y: 510, width: 60, height: 140 },
                // Spawner blockers (covers immediately in front of base zones)
                { x: 230, y: 375, width: 40, height: 50 },
                { x: 930, y: 375, width: 40, height: 50 }
            ];
        }

        // Particle System helpers
        function createExplosion(x, y, color) {
            // High velocity team-colored confetti particles
            let count = 25;
            for (let i = 0; i < count; i++) {
                let pAngle = Math.random() * Math.PI * 2;
                let pSpeed = 60 + Math.random() * 140;
                STATE.particles.push({
                    x: x,
                    y: y,
                    vx: Math.cos(pAngle) * pSpeed,
                    vy: Math.sin(pAngle) * pSpeed,
                    color: color,
                    alpha: 1,
                    life: 0,
                    maxLife: 0.5 + Math.random() * 0.5,
                    size: 3 + Math.random() * 4
                });
            }
            
            // Grey smoke puff
            for (let i = 0; i < 12; i++) {
                let pAngle = Math.random() * Math.PI * 2;
                let pSpeed = 15 + Math.random() * 25;
                STATE.particles.push({
                    x: x,
                    y: y,
                    vx: Math.cos(pAngle) * pSpeed,
                    vy: Math.sin(pAngle) * pSpeed,
                    color: '#e2e8f0',
                    alpha: 0.8,
                    life: 0,
                    maxLife: 0.7 + Math.random() * 0.4,
                    size: 8 + Math.random() * 10
                });
            }
        }

        function createRespawnBurst(x, y, color) {
            // Imploding/exploding particles showing respawn safe-arrival
            let count = 15;
            for (let i = 0; i < count; i++) {
                let pAngle = Math.random() * Math.PI * 2;
                let pSpeed = 30 + Math.random() * 50;
                STATE.particles.push({
                    x: x,
                    y: y,
                    vx: Math.cos(pAngle) * pSpeed,
                    vy: Math.sin(pAngle) * pSpeed,
                    color: '#fef08a', // yellow indicator glow
                    alpha: 1,
                    life: 0,
                    maxLife: 0.4,
                    size: 2 + Math.random() * 3
                });
            }
        }

        function createImpactParticles(x, y) {
            // Small dust sparks
            let count = 6;
            for (let i = 0; i < count; i++) {
                let pAngle = Math.random() * Math.PI * 2;
                let pSpeed = 25 + Math.random() * 35;
                STATE.particles.push({
                    x: x,
                    y: y,
                    vx: Math.cos(pAngle) * pSpeed,
                    vy: Math.sin(pAngle) * pSpeed,
                    color: '#94a3b8',
                    alpha: 0.8,
                    life: 0,
                    maxLife: 0.25,
                    size: 1.5 + Math.random() * 2
                });
            }
        }

        function fireBullet(shooter) {
            const bulletSpeed = 250; // px/sec
            let vx = Math.cos(shooter.angle) * bulletSpeed;
            let vy = Math.sin(shooter.angle) * bulletSpeed;
            
            // Firing muzzle offset in front of blaster
            let offset = shooter.radius + 10;
            let bx = shooter.x + Math.cos(shooter.angle) * offset;
            let by = shooter.y + Math.sin(shooter.angle) * offset;
            
            STATE.bullets.push({
                x: bx,
                y: by,
                vx: vx,
                vy: vy,
                radius: 6,
                team: shooter.team,
                active: true
            });
            
            // Sparkles on shoot
            for (let i = 0; i < 4; i++) {
                let sparkAngle = shooter.angle + (Math.random() - 0.5) * 0.4;
                let sparkSpeed = 60 + Math.random() * 50;
                STATE.particles.push({
                    x: bx,
                    y: by,
                    vx: Math.cos(sparkAngle) * sparkSpeed,
                    vy: Math.sin(sparkAngle) * sparkSpeed,
                    color: shooter.team === 'red' ? '#fca5a5' : '#93c5fd',
                    alpha: 0.9,
                    life: 0,
                    maxLife: 0.2,
                    size: 2 + Math.random() * 2
                });
            }
        }

        // Raycast check for bots - samples 12 points along line of sight segment
        function hasLineOfSight(x1, y1, x2, y2) {
            let dx = x2 - x1;
            let dy = y2 - y1;
            let distance = Math.sqrt(dx * dx + dy * dy);
            let checkInterval = 20; // check points every 20px
            let steps = Math.ceil(distance / checkInterval);
            
            for (let i = 1; i < steps; i++) {
                let t = i / steps;
                let px = x1 + dx * t;
                let py = y1 + dy * t;
                
                for (let obs of STATE.obstacles) {
                    if (px >= obs.x && px <= obs.x + obs.width &&
                        py >= obs.y && py <= obs.y + obs.height) {
                        return false; // Obstacle blocks line of sight
                    }
                }
            }
            return true;
        }

        // Bot AI Controller
        function updateBotAI(bot, dt) {
            // Find nearest non-tagged enemy
            let target = null;
            let minDist = Infinity;
            
            STATE.players.forEach(p => {
                if (p.team !== bot.team && p.tagTimer <= 0) {
                    let dx = p.x - bot.x;
                    let dy = p.y - bot.y;
                    let dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < minDist) {
                        minDist = dist;
                        target = p;
                    }
                }
            });
            
            let moveX = 0;
            let moveY = 0;
            
            if (target) {
                let targetDx = target.x - bot.x;
                let targetDy = target.y - bot.y;
                let targetAngle = Math.atan2(targetDy, targetDx);
                
                // Rotates towards enemy target (max rate of 3.8 rad/sec)
                let diff = targetAngle - bot.angle;
                diff = Math.atan2(Math.sin(diff), Math.cos(diff)); // wrap [-PI, PI]
                let maxRot = 3.8 * dt;
                if (Math.abs(diff) < maxRot) {
                    bot.angle = targetAngle;
                } else {
                    bot.angle += Math.sign(diff) * maxRot;
                }
                
                // Keep target range ~240px
                if (minDist > 270) {
                    // Get closer
                    moveX = targetDx / minDist;
                    moveY = targetDy / minDist;
                } else if (minDist < 160) {
                    // Retreat
                    moveX = -targetDx / minDist;
                    moveY = -targetDy / minDist;
                } else {
                    // Orbit perpendicular around target (dodge mode)
                    moveX = -targetDy / minDist;
                    moveY = targetDx / minDist;
                    
                    // Minor radial adjustment to keep centering
                    if (minDist > 220) {
                        moveX += (targetDx / minDist) * 0.15;
                        moveY += (targetDy / minDist) * 0.15;
                    } else {
                        moveX -= (targetDx / minDist) * 0.15;
                        moveY -= (targetDy / minDist) * 0.15;
                    }
                }
            } else {
                // No enemies active: head toward center/enemy base region to patrol
                let baseGoal = bot.team === 'red' ? STATE.bases.blue : STATE.bases.red;
                let targetDx = baseGoal.x - bot.x;
                let targetDy = baseGoal.y - bot.y;
                let dist = Math.sqrt(targetDx * targetDx + targetDy * targetDy);
                
                if (dist > 50) {
                    moveX = targetDx / dist;
                    moveY = targetDy / dist;
                }
                bot.angle += 0.5 * dt; // slow spin scanning pattern
            }
            
            // Normalize movement speed
            let len = Math.sqrt(moveX * moveX + moveY * moveY);
            if (len > 0) {
                moveX /= len;
                moveY /= len;
            }
            
            // Potential Field Obstacle Avoidance (soft pushing bot away from corners/walls)
            STATE.obstacles.forEach(obs => {
                let cx = Math.max(obs.x, Math.min(bot.x, obs.x + obs.width));
                let cy = Math.max(obs.y, Math.min(bot.y, obs.y + obs.height));
                let dxObs = bot.x - cx;
                let dyObs = bot.y - cy;
                let distObs = Math.sqrt(dxObs * dxObs + dyObs * dyObs);
                
                if (distObs < 60) {
                    let push = (60 - distObs) / 60; // stronger closer
                    if (distObs > 0) {
                        moveX += (dxObs / distObs) * push * 3.0;
                        moveY += (dyObs / distObs) * push * 3.0;
                    } else {
                        // center overlap push
                        let obsCX = obs.x + obs.width / 2;
                        let obsCY = obs.y + obs.height / 2;
                        let dxC = bot.x - obsCX;
                        let dyC = bot.y - obsCY;
                        let lenC = Math.sqrt(dxC * dxC + dyC * dyC) || 1;
                        moveX += (dxC / lenC) * 3.0;
                        moveY += (dyC / lenC) * 3.0;
                    }
                }
            });
            
            // Final velocity apply
            let finalLen = Math.sqrt(moveX * moveX + moveY * moveY);
            if (finalLen > 0) {
                bot.vx = (moveX / finalLen) * bot.speed;
                bot.vy = (moveY / finalLen) * bot.speed;
            } else {
                bot.vx = 0;
                bot.vy = 0;
            }
            
            // Firing Check
            if (target && bot.shootCooldown <= 0) {
                if (hasLineOfSight(bot.x, bot.y, target.x, target.y)) {
                    // Shoot if aiming roughly within 12 degrees
                    let aimDx = target.x - bot.x;
                    let aimDy = target.y - bot.y;
                    let currentAim = Math.atan2(aimDy, aimDx);
                    let angleDiff = Math.abs(Math.atan2(Math.sin(bot.angle - currentAim), Math.cos(bot.angle - currentAim)));
                    
                    if (angleDiff < 0.22) {
                        fireBullet(bot);
                        bot.shootCooldown = 1.0 + Math.random() * 1.2; // random shooting interval
                    }
                }
            }
        }

        // Resolves entity vs bounds, obstacles, and player-to-player pushing
        function resolveCollisions(entity) {
            if (entity.tagTimer > 0) return;
            
            // 1. Arena Boundary
            entity.x = Math.max(entity.radius, Math.min(canvas.width - entity.radius, entity.x));
            entity.y = Math.max(entity.radius, Math.min(canvas.height - entity.radius, entity.y));
            
            // 2. Obstacles (Circle-to-AABB Box resolution)
            STATE.obstacles.forEach(obs => {
                let closestX = Math.max(obs.x, Math.min(entity.x, obs.x + obs.width));
                let closestY = Math.max(obs.y, Math.min(entity.y, obs.y + obs.height));
                
                let dx = entity.x - closestX;
                let dy = entity.y - closestY;
                let distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance < entity.radius) {
                    let overlap = entity.radius - distance;
                    if (distance === 0) {
                        // penetration edge push fallback
                        let distL = entity.x - obs.x;
                        let distR = (obs.x + obs.width) - entity.x;
                        let distT = entity.y - obs.y;
                        let distB = (obs.y + obs.height) - entity.y;
                        let minDist = Math.min(distL, distR, distT, distB);
                        
                        if (minDist === distL) entity.x -= entity.radius;
                        else if (minDist === distR) entity.x += entity.radius;
                        else if (minDist === distT) entity.y -= entity.radius;
                        else entity.y += entity.radius;
                    } else {
                        entity.x += (dx / distance) * overlap;
                        entity.y += (dy / distance) * overlap;
                    }
                }
            });
            
            // 3. Player vs Player (push-apart)
            STATE.players.forEach(other => {
                if (other === entity || other.tagTimer > 0) return;
                
                let dx = entity.x - other.x;
                let dy = entity.y - other.y;
                let dist = Math.sqrt(dx * dx + dy * dy);
                let minDist = entity.radius + other.radius;
                
                if (dist < minDist) {
                    let overlap = minDist - dist;
                    if (dist === 0) {
                        entity.x += entity.radius;
                    } else {
                        // Push split evenly between active entities
                        entity.x += (dx / dist) * overlap * 0.5;
                        entity.y += (dy / dist) * overlap * 0.5;
                        other.x -= (dx / dist) * overlap * 0.5;
                        other.y -= (dy / dist) * overlap * 0.5;
                    }
                }
            });
        }

        // Main game ticks
        function update(dt) {
            // Update cooldowns & respawn timelines
            STATE.players.forEach(p => {
                if (p.shootCooldown > 0) p.shootCooldown -= dt;
                if (p.tagTimer > 0) {
                    p.tagTimer -= dt;
                    if (p.tagTimer <= 0) {
                        p.x = p.spawnX;
                        p.y = p.spawnY;
                        p.vx = 0;
                        p.vy = 0;
                        createRespawnBurst(p.x, p.y, p.color);
                    }
                }
            });

            // Update player positions & inputs
            STATE.players.forEach(p => {
                if (p.tagTimer > 0) return; // skip inactive tagged entities
                
                if (p.isBot) {
                    updateBotAI(p, dt);
                } else {
                    // Keyboard player movement
                    let moveX = 0;
                    let moveY = 0;
                    if (keys.w) moveY -= 1;
                    if (keys.s) moveY += 1;
                    if (keys.a) moveX -= 1;
                    if (keys.d) moveX += 1;
                    
                    let len = Math.sqrt(moveX * moveX + moveY * moveY);
                    if (len > 0) {
                        p.vx = (moveX / len) * p.speed;
                        p.vy = (moveY / len) * p.speed;
                    } else {
                        p.vx = 0;
                        p.vy = 0;
                    }
                    
                    // Mouse look rotation
                    let aimDx = mouse.x - p.x;
                    let aimDy = mouse.y - p.y;
                    p.angle = Math.atan2(aimDy, aimDx);
                    
                    // Handle mouse firing
                    if (mouse.click && p.shootCooldown <= 0) {
                        fireBullet(p);
                        p.shootCooldown = 0.38; // 0.38s click speed
                    }
                }
                
                // Position tick
                p.x += p.vx * dt;
                p.y += p.vy * dt;
                
                resolveCollisions(p);
            });

            // Update Bullets
            for (let i = STATE.bullets.length - 1; i >= 0; i--) {
                let b = STATE.bullets[i];
                b.x += b.vx * dt;
                b.y += b.vy * dt;
                
                // Out of boundaries check
                if (b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) {
                    b.active = false;
                }
                
                // Obstacle hits check
                if (b.active) {
                    for (let obs of STATE.obstacles) {
                        if (b.x >= obs.x && b.x <= obs.x + obs.width &&
                            b.y >= obs.y && b.y <= obs.y + obs.height) {
                            b.active = false;
                            createImpactParticles(b.x, b.y);
                            break;
                        }
                    }
                }
                
                // Enemy tags check (Friendly fire off)
                if (b.active) {
                    for (let p of STATE.players) {
                        if (p.tagTimer <= 0 && p.team !== b.team) {
                            let dx = b.x - p.x;
                            let dy = b.y - p.y;
                            let dist = Math.sqrt(dx * dx + dy * dy);
                            if (dist < p.radius + b.radius) {
                                p.tag();
                                b.active = false;
                                break;
                            }
                        }
                    }
                }
                
                // Bullet particle trail
                if (b.active && Math.random() < 0.55) {
                    STATE.particles.push({
                        x: b.x,
                        y: b.y,
                        vx: (Math.random() - 0.5) * 12,
                        vy: (Math.random() - 0.5) * 12,
                        color: b.team === 'red' ? 'rgba(239, 68, 68, 0.45)' : 'rgba(59, 130, 246, 0.45)',
                        alpha: 0.75,
                        life: 0,
                        maxLife: 0.35,
                        size: 2 + Math.random() * 2
                    });
                }
                
                if (!b.active) {
                    STATE.bullets.splice(i, 1);
                }
            }

            // Update particles
            for (let i = STATE.particles.length - 1; i >= 0; i--) {
                let p = STATE.particles[i];
                p.x += p.vx * dt;
                p.y += p.vy * dt;
                p.life += dt;
                p.alpha = 1 - (p.life / p.maxLife);
                if (p.life >= p.maxLife) {
                    STATE.particles.splice(i, 1);
                }
            }

            updateHUD();
        }

        // Draw bases
        function drawBase(team, pos, time) {
            ctx.save();
            
            // Revolving dashed boundary
            ctx.strokeStyle = team === 'red' ? '#ef4444' : '#3b82f6';
            ctx.lineWidth = 3.5;
            ctx.shadowColor = team === 'red' ? '#ef4444' : '#3b82f6';
            ctx.shadowBlur = 12;
            
            ctx.setLineDash([12, 12]);
            ctx.lineDashOffset = -time * 30;
            
            ctx.beginPath();
            ctx.arc(pos.x, pos.y, STATE.baseRadius, 0, Math.PI * 2);
            ctx.stroke();
            
            // Inner base pool
            ctx.shadowBlur = 0;
            ctx.fillStyle = team === 'red' ? 'rgba(239, 68, 68, 0.12)' : 'rgba(59, 130, 246, 0.12)';
            ctx.beginPath();
            ctx.arc(pos.x, pos.y, STATE.baseRadius - 2, 0, Math.PI * 2);
            ctx.fill();
            
            // Draw center shield/flag badge
            ctx.fillStyle = team === 'red' ? 'rgba(239, 68, 68, 0.3)' : 'rgba(59, 130, 246, 0.3)';
            ctx.beginPath();
            ctx.arc(pos.x, pos.y, 24, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.font = '22px Outfit, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(team === 'red' ? '🚩' : '🛡️', pos.x, pos.y);
            
            ctx.restore();
        }

        // Draw 3D-styled cover obstacles
        function drawObstacle(obs) {
            ctx.save();
            
            // Cast dropshadow
            ctx.shadowColor = 'rgba(11, 15, 25, 0.45)';
            ctx.shadowBlur = 12;
            ctx.shadowOffsetY = 6;
            
            const r = 8; // rounded corners
            ctx.beginPath();
            ctx.moveTo(obs.x + r, obs.y);
            ctx.lineTo(obs.x + obs.width - r, obs.y);
            ctx.quadraticCurveTo(obs.x + obs.width, obs.y, obs.x + obs.width, obs.y + r);
            ctx.lineTo(obs.x + obs.width, obs.y + obs.height - r);
            ctx.quadraticCurveTo(obs.x + obs.width, obs.y + obs.height, obs.x + obs.width - r, obs.y + obs.height);
            ctx.lineTo(obs.x + r, obs.y + obs.height);
            ctx.quadraticCurveTo(obs.x, obs.y + obs.height, obs.x, obs.y + obs.height - r);
            ctx.lineTo(obs.x, obs.y + r);
            ctx.quadraticCurveTo(obs.x, obs.y, obs.x + r, obs.y);
            ctx.closePath();
            
            let grad = ctx.createLinearGradient(obs.x, obs.y, obs.x, obs.y + obs.height);
            grad.addColorStop(0, '#475569'); // slate-600 top
            grad.addColorStop(1, '#1e293b'); // slate-800 bottom
            ctx.fillStyle = grad;
            ctx.fill();
            
            // Inner beveled edge highlights
            ctx.shadowColor = 'transparent';
            ctx.shadowBlur = 0;
            ctx.strokeStyle = '#64748b';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // Draw static moss details for natural kid-friendly aesthetic
            ctx.fillStyle = '#16a34a'; // dark lime moss
            let hash = (obs.x * 5 + obs.y * 11) % 4;
            ctx.beginPath();
            if (hash === 0 || hash === 2) {
                ctx.arc(obs.x + 8, obs.y + 8, 6, 0, Math.PI * 2);
                ctx.arc(obs.x + obs.width - 8, obs.y + obs.height - 8, 7, 0, Math.PI * 2);
            }
            if (hash === 1 || hash === 2) {
                ctx.arc(obs.x + obs.width - 9, obs.y + 8, 5, 0, Math.PI * 2);
                ctx.arc(obs.x + 8, obs.y + obs.height - 8, 6, 0, Math.PI * 2);
            }
            ctx.fill();
            
            ctx.fillStyle = '#4ade80'; // bright lime moss overlay
            ctx.beginPath();
            if (hash === 0 || hash === 2) {
                ctx.arc(obs.x + 6, obs.y + 6, 2.5, 0, Math.PI * 2);
                ctx.arc(obs.x + obs.width - 9, obs.y + obs.height - 9, 2.5, 0, Math.PI * 2);
            }
            ctx.fill();
            
            ctx.restore();
        }

        // Draw slow energy bullet
        function drawBullet(b) {
            ctx.save();
            
            ctx.shadowColor = b.team === 'red' ? '#ef4444' : '#3b82f6';
            ctx.shadowBlur = 10;
            
            let grad = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.radius);
            grad.addColorStop(0, '#ffffff'); // pure hot center
            grad.addColorStop(0.3, b.team === 'red' ? '#fca5a5' : '#93c5fd');
            grad.addColorStop(1, b.team === 'red' ? '#dc2626' : '#2563eb');
            
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.restore();
        }

        // Draw Player and bots with vector animations
        function drawPlayer(p, time) {
            ctx.save();
            
            // Flashing rendering when tagged
            if (p.tagTimer > 0) {
                let show = Math.floor(time * 15) % 2 === 0;
                if (!show) {
                    ctx.restore();
                    return; // skip this frame
                }
                ctx.globalAlpha = 0.35;
            }
            
            ctx.translate(p.x, p.y);
            ctx.rotate(p.angle);
            
            // Shadow
            ctx.shadowColor = 'rgba(15, 23, 42, 0.4)';
            ctx.shadowBlur = 10;
            ctx.shadowOffsetY = 4;
            
            // 1. Draw Blaster Gun
            ctx.fillStyle = '#475569';
            ctx.beginPath();
            ctx.roundRect(4, -5, 23, 10, 3);
            ctx.fill();
            
            // Blaster core muzzle highlight
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.roundRect(22, -6, 5, 12, 2);
            ctx.fill();
            
            // 2. Draw Main Body
            let grad = ctx.createRadialGradient(-3, -3, 0, 0, 0, p.radius);
            if (p.team === 'red') {
                grad.addColorStop(0, '#fca5a5');
                grad.addColorStop(1, '#b91c1c');
            } else {
                grad.addColorStop(0, '#93c5fd');
                grad.addColorStop(1, '#1d4ed8');
            }
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(0, 0, p.radius, 0, Math.PI * 2);
            ctx.fill();
            
            // Body Outline highlight
            ctx.shadowColor = 'transparent';
            ctx.shadowBlur = 0;
            ctx.shadowOffsetY = 0;
            ctx.strokeStyle = p.borderColor;
            ctx.lineWidth = 2.5;
            ctx.stroke();
            
            // 3. Draw headgear straps at the back of player circles
            ctx.fillStyle = p.team === 'red' ? '#7f1d1d' : '#1e3a8a';
            ctx.beginPath();
            ctx.moveTo(-18, -4);
            ctx.lineTo(-27, -8);
            ctx.lineTo(-22, -1);
            ctx.closePath();
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(-18, 4);
            ctx.lineTo(-27, 8);
            ctx.lineTo(-22, 1);
            ctx.closePath();
            ctx.fill();
            
            // 4. Draw eyes looking in aim angle (front is to the right)
            // Left eye white
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(9, -7, 5, 0, Math.PI * 2);
            ctx.fill();
            // Left pupil
            ctx.fillStyle = '#0f172a';
            ctx.beginPath();
            ctx.arc(11, -7, 2.2, 0, Math.PI * 2);
            ctx.fill();
            
            // Right eye white
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(9, 7, 5, 0, Math.PI * 2);
            ctx.fill();
            // Right pupil
            ctx.fillStyle = '#0f172a';
            ctx.beginPath();
            ctx.arc(11, 7, 2.2, 0, Math.PI * 2);
            ctx.fill();
            
            // Animated eyebrows
            ctx.strokeStyle = '#0f172a';
            ctx.lineWidth = 1.6;
            ctx.beginPath();
            ctx.arc(8, -8, 4, Math.PI * 1.25, Math.PI * 1.75);
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(8, 8, 4, Math.PI * 0.25, Math.PI * 0.75);
            ctx.stroke();
            
            ctx.restore(); // restores rotation/position matrix
            
            // Floating UI Labels (drawn in world coords)
            ctx.save();
            ctx.textAlign = 'center';
            ctx.textBaseline = 'bottom';
            
            if (p.tagTimer > 0) {
                ctx.fillStyle = '#ef4444';
                ctx.font = 'bold 12px Outfit, sans-serif';
                ctx.strokeStyle = '#0b0f19';
                ctx.lineWidth = 3;
                ctx.strokeText('💥 TAGGED!', p.x, p.y - 28);
                ctx.fillText('💥 TAGGED!', p.x, p.y - 28);
            } else {
                if (!p.isBot) {
                    // Yellow spin ring around human player
                    ctx.strokeStyle = '#fbbf24';
                    ctx.lineWidth = 2;
                    ctx.setLineDash([6, 6]);
                    ctx.lineDashOffset = time * 15;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius + 6, 0, Math.PI * 2);
                    ctx.stroke();
                    
                    ctx.fillStyle = '#fbbf24';
                    ctx.font = 'bold 12px Outfit, sans-serif';
                    ctx.shadowColor = 'rgba(0,0,0,0.5)';
                    ctx.shadowBlur = 4;
                    ctx.fillText('👑 YOU', p.x, p.y - 28);
                } else {
                    ctx.fillStyle = '#ffffff';
                    ctx.font = '10px Outfit, sans-serif';
                    ctx.strokeStyle = 'rgba(15, 23, 42, 0.8)';
                    ctx.lineWidth = 2.5;
                    ctx.strokeText(p.id, p.x, p.y - 28);
                    ctx.fillText(p.id, p.x, p.y - 28);
                }
            }
            ctx.restore();
        }

        // Render scene
        function render(time) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 1. Checkerboard Grassy Floor
            const tileSize = 40;
            const cols = canvas.width / tileSize;
            const rows = canvas.height / tileSize;
            
            for (let c = 0; c < cols; c++) {
                for (let r = 0; r < rows; r++) {
                    if ((c + r) % 2 === 0) {
                        ctx.fillStyle = '#84cc16'; // Lime-500
                    } else {
                        ctx.fillStyle = '#a3e635'; // Lime-400
                    }
                    ctx.fillRect(c * tileSize, r * tileSize, tileSize, tileSize);
                }
            }
            
            // 2. Bases
            drawBase('red', STATE.bases.red, time);
            drawBase('blue', STATE.bases.blue, time);
            
            // 3. Particles
            ctx.shadowBlur = 0;
            STATE.particles.forEach(p => {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = Math.max(0, p.alpha);
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1.0;
            
            // 4. Obstacles
            STATE.obstacles.forEach(obs => {
                drawObstacle(obs);
            });
            
            // 5. Bullets
            STATE.bullets.forEach(b => {
                drawBullet(b);
            });
            
            // 6. Active Players/Bots
            STATE.players.forEach(p => {
                drawPlayer(p, time);
            });
        }

        // Update HTML HUD
        function updateHUD() {
            const redHUD = document.getElementById('red-bots-hud');
            const blueHUD = document.getElementById('blue-bots-hud');
            
            let redHTML = '';
            let blueHTML = '';
            
            STATE.players.forEach(p => {
                const icon = p.tagTimer > 0 ? '💥' : (p.isBot ? '🤖' : '👑');
                const title = p.tagTimer > 0 ? 'Tagged!' : (p.isBot ? 'Bot' : 'You');
                const pClass = p.isBot ? '' : ' player';
                const tagClass = p.tagTimer > 0 ? ' tagged' : '';
                
                const itemHTML = `<span class="hud-icon${pClass}${tagClass}" title="${title}">${icon}</span> `;
                
                if (p.team === 'red') {
                    redHTML += itemHTML;
                } else {
                    blueHTML += itemHTML;
                }
            });
            
            redHUD.innerHTML = redHTML;
            blueHUD.innerHTML = blueHTML;
        }

        // Convert page coordinate space to Canvas internally-scaled coordinates
        function getMousePos(canvas, evt) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: (evt.clientX - rect.left) * (canvas.width / rect.width),
                y: (evt.clientY - rect.top) * (canvas.height / rect.height)
            };
        }

        // Global Event Listeners
        window.addEventListener('keydown', e => {
            if (e.code === 'KeyW' || e.key === 'ArrowUp') keys.w = true;
            if (e.code === 'KeyS' || e.key === 'ArrowDown') keys.s = true;
            if (e.code === 'KeyA' || e.key === 'ArrowLeft') keys.a = true;
            if (e.code === 'KeyD' || e.key === 'ArrowRight') keys.d = true;
        });

        window.addEventListener('keyup', e => {
            if (e.code === 'KeyW' || e.key === 'ArrowUp') keys.w = false;
            if (e.code === 'KeyS' || e.key === 'ArrowDown') keys.s = false;
            if (e.code === 'KeyA' || e.key === 'ArrowLeft') keys.a = false;
            if (e.code === 'KeyD' || e.key === 'ArrowRight') keys.d = false;
        });

        window.addEventListener('mousemove', e => {
            const pos = getMousePos(canvas, e);
            mouse.x = pos.x;
            mouse.y = pos.y;
        });

        window.addEventListener('mousedown', e => {
            if (e.button === 0) {
                mouse.click = true;
            }
        });

        window.addEventListener('mouseup', e => {
            if (e.button === 0) {
                mouse.click = false;
            }
        });

        // Prevent mouse text selection during play & right-click menus
        canvas.addEventListener('contextmenu', e => e.preventDefault());
        
        document.getElementById('restart-btn').addEventListener('click', () => {
            initGame();
        });

        // Game Loop
        let lastTime = 0;
        function gameLoop(time) {
            if (!lastTime) lastTime = time;
            let dt = (time - lastTime) / 1000;
            lastTime = time;
            
            // Limit delta step if user switches window tabs
            if (dt > 0.1) dt = 0.1;
            
            update(dt);
            render(time / 1000);
            
            requestAnimationFrame(gameLoop);
        }

        // Bootstrap Match
        initGame();
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
